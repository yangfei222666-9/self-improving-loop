<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="904" viewBox="0 0 1280 904" role="img" aria-label="self-improving-loop terminal demo">
  <rect width="100%" height="100%" rx="22" fill="#071013"/>
  <circle cx="38" cy="36" r="8" fill="#ff5f57"/>
  <circle cx="64" cy="36" r="8" fill="#ffbd2e"/>
  <circle cx="90" cy="36" r="8" fill="#28c840"/>
  <text x="124" y="43" fill="#a7f3d0" font-size="22" font-family="SFMono-Regular, Menlo, Consolas, monospace">self-improving-loop demo</text>
  <text x="44" y="68" fill="#94a3b8" font-size="16" font-family="SFMono-Regular, Menlo, Consolas, monospace">trace → six lines → hexagram policy → guarded patch → rollback</text>
  <text x="44" y="92" fill="#67e8f9" font-size="20" font-family="SFMono-Regular, Menlo, Consolas, monospace"># Yijing strategy / 六爻状态机策略</text><text x="44" y="120" fill="#d9f99d" font-size="20" font-family="SFMono-Regular, Menlo, Consolas, monospace">$ python3 examples/04_yijing_strategy.py</text><text x="44" y="148" fill="#e5e7eb" font-size="20" font-family="SFMono-Regular, Menlo, Consolas, monospace">[NORMAL] 🔧 Self-Improving Loop</text><text x="44" y="176" fill="#e5e7eb" font-size="20" font-family="SFMono-Regular, Menlo, Consolas, monospace"></text><text x="44" y="204" fill="#e5e7eb" font-size="20" font-family="SFMono-Regular, Menlo, Consolas, monospace">Agent: yijing-agent</text><text x="44" y="232" fill="#e5e7eb" font-size="20" font-family="SFMono-Regular, Menlo, Consolas, monospace">应用了 1 项自动改进</text><text x="44" y="260" fill="#e5e7eb" font-size="20" font-family="SFMono-Regular, Menlo, Consolas, monospace"></text><text x="44" y="288" fill="#e5e7eb" font-size="20" font-family="SFMono-Regular, Menlo, Consolas, monospace">time: local demo run</text><text x="44" y="316" fill="#e5e7eb" font-size="20" font-family="SFMono-Regular, Menlo, Consolas, monospace">yijing strategy ok</text><text x="44" y="344" fill="#fde68a" font-size="20" font-family="SFMono-Regular, Menlo, Consolas, monospace">hexagram: Kun / 坤</text><text x="44" y="372" fill="#fde68a" font-size="20" font-family="SFMono-Regular, Menlo, Consolas, monospace">policy_action: conserve_and_rollback_bias</text><text x="44" y="400" fill="#e5e7eb" font-size="20" font-family="SFMono-Regular, Menlo, Consolas, monospace">data dir: /tmp/sil_demo_*</text><text x="44" y="428" fill="#e5e7eb" font-size="20" font-family="SFMono-Regular, Menlo, Consolas, monospace"></text><text x="44" y="456" fill="#67e8f9" font-size="20" font-family="SFMono-Regular, Menlo, Consolas, monospace"># Config rollback / 配置自动回滚</text><text x="44" y="484" fill="#d9f99d" font-size="20" font-family="SFMono-Regular, Menlo, Consolas, monospace">$ python3 examples/02_config_rollback.py</text><text x="44" y="512" fill="#e5e7eb" font-size="20" font-family="SFMono-Regular, Menlo, Consolas, monospace">[NORMAL] 🔧 Self-Improving Loop</text><text x="44" y="540" fill="#e5e7eb" font-size="20" font-family="SFMono-Regular, Menlo, Consolas, monospace"></text><text x="44" y="568" fill="#e5e7eb" font-size="20" font-family="SFMono-Regular, Menlo, Consolas, monospace">Agent: rollback-demo-agent</text><text x="44" y="596" fill="#e5e7eb" font-size="20" font-family="SFMono-Regular, Menlo, Consolas, monospace">应用了 1 项自动改进</text><text x="44" y="624" fill="#e5e7eb" font-size="20" font-family="SFMono-Regular, Menlo, Consolas, monospace"></text><text x="44" y="652" fill="#e5e7eb" font-size="20" font-family="SFMono-Regular, Menlo, Consolas, monospace">time: local demo run</text><text x="44" y="680" fill="#e5e7eb" font-size="20" font-family="SFMono-Regular, Menlo, Consolas, monospace">[HIGH] ⚠️ 自动回滚告警</text><text x="44" y="708" fill="#e5e7eb" font-size="20" font-family="SFMono-Regular, Menlo, Consolas, monospace"></text><text x="44" y="736" fill="#e5e7eb" font-size="20" font-family="SFMono-Regular, Menlo, Consolas, monospace">Agent: rollback-demo-agent</text><text x="44" y="764" fill="#e5e7eb" font-size="20" font-family="SFMono-Regular, Menlo, Consolas, monospace">原因: 成功率下降 40.0% (从 50.0% 到 10.0%)</text><text x="44" y="792" fill="#e5e7eb" font-size="20" font-family="SFMono-Regular, Menlo, Consolas, monospace"></text><text x="44" y="820" fill="#e5e7eb" font-size="20" font-family="SFMono-Regular, Menlo, Consolas, monospace">指标对比:</text><text x="44" y="848" fill="#e5e7eb" font-size="20" font-family="SFMono-Regular, Menlo, Consolas, monospace">  • 成功率: 50.0% → 10.0%</text>
</svg>
